<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS || The Gaming Hub</title>
    <style>
        :root {
            --bg-dark: #07080b;
            --bg-card: rgba(18, 20, 32, 0.6);
            --bg-glass: rgba(10, 11, 16, 0.7);
            --accent-neon: #00ffcc;
            --accent-purple: #7000ff;
            --accent-purple-glow: rgba(112, 0, 255, 0.5);
            --text-main: #f0f3f8;
            --text-muted: #8b95a5;
            --border-light: rgba(255, 255, 255, 0.08);
            --ad-bg: rgba(22, 25, 43, 0.8);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
            line-height: 1.6;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(112, 0, 255, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(0, 255, 204, 0.05), transparent 25%);
            background-attachment: fixed;
        }

        /* --- Header & Live Navigation --- */
        header {
            background: var(--bg-glass);
            border-bottom: 1px solid var(--border-light);
            padding: 15px 5%;
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        @media (min-width: 968px) {
            header {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
                padding: 15px 20px;
                max-width: 1400px;
                margin: 0 auto;
                border-bottom: none;
                border-radius: 0 0 16px 16px;
                border: 1px solid var(--border-light);
                border-top: none;
            }
        }

        .logo {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 1.5px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .logo span {
            color: var(--accent-neon);
            text-shadow: 0 0 12px rgba(0, 255, 204, 0.4);
        }

        nav {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 5px;
            scrollbar-width: none; /* Firefox */
        }
        
        nav::-webkit-scrollbar { display: none; }

        nav button {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-light);
            color: var(--text-muted);
            padding: 10px 20px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            font-size: 13px;
            letter-spacing: 0.5px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
        }

        nav button:hover {
            color: #fff;
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
        }

        nav button.active {
            background: var(--accent-purple);
            color: white;
            border-color: var(--accent-purple);
            box-shadow: 0 4px 15px var(--accent-purple-glow);
        }

        /* --- Global Ad Slots --- */
        .ad-container {
            margin: 30px auto;
            display: flex;
            justify-content: center;
            position: relative;
        }

        .ad-container::before {
            content: 'ADVERTISEMENT';
            position: absolute;
            top: -20px;
            font-size: 10px;
            color: var(--text-muted);
            letter-spacing: 2px;
        }

        /* --- Main Layout Grid --- */
        .container {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        @media (min-width: 1024px) {
            .container {
                grid-template-columns: 1fr 340px;
            }
        }

        /* --- News Feed Layout --- */
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .news-card {
            background: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border-light);
            transition: all 0.4s ease;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(10px);
            text-decoration: none;
            color: inherit;
        }

        .news-card:hover {
            transform: translateY(-8px);
            border-color: var(--accent-purple);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 15px rgba(112, 0, 255, 0.2);
        }

        .card-img-wrapper {
            width: 100%;
            height: 200px;
            overflow: hidden;
            position: relative;
        }

        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .news-card:hover .card-img {
            transform: scale(1.05);
        }

        .card-tag {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.8);
            color: var(--accent-neon);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(0, 255, 204, 0.2);
        }

        .card-body {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .card-source {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 12px;
            line-height: 1.4;
            color: #fff;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-desc {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 20px;
            flex-grow: 1;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .read-more {
            color: var(--accent-neon);
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: auto;
        }

        .read-more svg {
            width: 16px;
            height: 16px;
            transition: transform 0.3s;
        }

        .news-card:hover .read-more svg {
            transform: translateX(5px);
        }

        /* --- Sidebar Features --- */
        aside {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .widget {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid var(--border-light);
            backdrop-filter: blur(10px);
        }

        .widget-title {
            font-size: 15px;
            font-weight: 800;
            letter-spacing: 1px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fff;
        }

        .widget-title::before {
            content: '';
            display: block;
            width: 4px;
            height: 16px;
            background: var(--accent-neon);
            border-radius: 2px;
            box-shadow: 0 0 8px rgba(0, 255, 204, 0.6);
        }

        .market-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        
        .market-table th { 
            color: var(--text-muted); 
            padding-bottom: 12px; 
            font-weight: 600; 
            text-align: left;
        }
        
        .market-table td { 
            padding: 12px 0; 
            border-bottom: 1px solid var(--border-light); 
            color: #fff; 
        }
        
        .market-table tr:last-child td { border-bottom: none; }
        .trend-up { color: #00ff66; font-weight: 600; }
        .trend-down { color: #ff3366; font-weight: 600; }

        /* Loader */
        .loader {
            display: flex;
            justify-content: center;
            padding: 50px;
            grid-column: 1 / -1;
            color: var(--accent-neon);
            font-weight: bold;
            letter-spacing: 2px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--accent-neon)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
            NEXUS<span>//</span>
        </div>
        <nav id="tab-bar">
            <button class="tab-btn active" data-feed="https://www.ign.com/rss/articles/feed">Top Stories</button>
            <button class="tab-btn" data-feed="https://www.eurogamer.net/feed/pc">PC Gaming</button>
            <button class="tab-btn" data-feed="https://www.eurogamer.net/feed/playstation">PlayStation</button>
            <button class="tab-btn" data-feed="https://www.eurogamer.net/feed/xbox">Xbox</button>
            <button class="tab-btn" data-feed="https://www.eurogamer.net/feed/nintendo">Nintendo</button>
            <button class="tab-btn" data-feed="https://www.gamespot.com/feeds/reviews/">Reviews</button>
        </nav>
    </header>

    <div class="ad-container">
        <div id="frame" style="width: 728px; height: 90px; margin: auto; z-index: 99998; background: var(--ad-bg); border-radius: 8px;">
            <iframe data-aa='2442543' src='//ad.a-ads.com/2442543/?size=728x90' style='border:0; padding:0; width:728px; height:90px; overflow:hidden; display:block; margin:auto;'></iframe>
        </div>
    </div>

    <div class="container">
        <main>
            <div class="news-grid" id="news-feed">
                </div>
        </main>

        <aside>
            <div class="ad-container" style="margin-top: 0;">
                <div id="frame" style="width: 300px; height: 250px; margin: auto; z-index: 99998; background: var(--ad-bg); border-radius: 8px;">
                    <iframe data-aa='2442542' src='//ad.a-ads.com/2442542/?size=300x250' style='border:0; padding:0; width:300px; height:250px; overflow:hidden; display:block; margin:auto;'></iframe>
                </div>
            </div>

            <div class="widget">
                <div class="widget-title">Hardware Market Monitor</div>
                <table class="market-table">
                    <thead>
                        <tr>
                            <th>Component</th>
                            <th>Price</th>
                            <th>Trend</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td>RTX 5070 Ti</td><td>$699</td><td class="trend-down">-4.2%</td></tr>
                        <tr><td>RX 8800 XT</td><td>$549</td><td class="trend-up">+1.8%</td></tr>
                        <tr><td>Ryzen 9800X3D</td><td>$449</td><td class="trend-up">+5.4%</td></tr>
                        <tr><td>Gen5 NVMe 2TB</td><td>$189</td><td class="trend-down">-2.1%</td></tr>
                    </tbody>
                </table>
            </div>
        </aside>
    </div>

    <script>
        const newsFeed = document.getElementById('news-feed');
        const defaultImage = "https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=600&auto=format&fit=crop";

        // Helper function to extract image from messy RSS descriptions
        function extractImage(itemStr, node) {
            // Check for explicit media content tags
            const mediaContent = node.getElementsByTagNameNS("*", "content");
            if (mediaContent.length > 0 && mediaContent[0].getAttribute('url')) {
                return mediaContent[0].getAttribute('url');
            }
            const enclosure = node.getElementsByTagName("enclosure");
            if (enclosure.length > 0 && enclosure[0].getAttribute('url')) {
                return enclosure[0].getAttribute('url');
            }
            // Regex to find img tag inside HTML descriptions
            const imgRegex = /<img[^>]+src="([^">]+)"/;
            const match = itemStr.match(imgRegex);
            return match ? match[1] : defaultImage;
        }

        // Clean up HTML tags from descriptions
        function stripHTML(html) {
            let tmp = document.createElement("DIV");
            tmp.innerHTML = html;
            return tmp.textContent || tmp.innerText || "";
        }

        async function fetchRSS(url) {
            newsFeed.innerHTML = '<div class="loader">FETCHING PROTOCOLS...</div>';
            try {
                // Using AllOrigins to bypass CORS issues natively
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
                const data = await response.json();
                
                const parser = new DOMParser();
                const xml = parser.parseFromString(data.contents, "text/xml");
                const items = xml.querySelectorAll("item");
                
                newsFeed.innerHTML = ''; // Clear loader
                
                let count = 0;
                items.forEach(item => {
                    if(count >= 12) return; // Limit to 12 articles per tab
                    
                    const title = item.querySelector("title")?.textContent || "No Title";
                    const link = item.querySelector("link")?.textContent || "#";
                    const rawDesc = item.querySelector("description")?.textContent || "";
                    const pubDate = new Date(item.querySelector("pubDate")?.textContent).toLocaleDateString();
                    
                    const cleanDesc = stripHTML(rawDesc).substring(0, 120) + "...";
                    const imageSrc = extractImage(item.innerHTML, item);

                    const articleHTML = `
                        <a href="${link}" target="_blank" class="news-card">
                            <div class="card-img-wrapper">
                                <div class="card-tag">LATEST</div>
                                <img class="card-img" src="${imageSrc}" alt="Article Image" onerror="this.src='${defaultImage}'">
                            </div>
                            <div class="card-body">
                                <div class="card-source">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                                    ${pubDate}
                                </div>
                                <h3 class="card-title">${title}</h3>
                                <p class="card-desc">${cleanDesc}</p>
                                <div class="read-more">
                                    INITIALIZE LINK 
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                                </div>
                            </div>
                        </a>
                    `;
                    newsFeed.innerHTML += articleHTML;
                    count++;
                });

            } catch (error) {
                console.error("Feed Error:", error);
                newsFeed.innerHTML = '<div class="loader" style="color: #ff3366;">CONNECTION FAILED. RETRYING...</div>';
            }
        }

        // Tab Switching Logic
        document.getElementById('tab-bar').addEventListener('click', (e) => {
            if (e.target.classList.contains('tab-btn') && !e.target.classList.contains('active')) {
                document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');
                
                const feedUrl = e.target.getAttribute('data-feed');
                fetchRSS(feedUrl);
            }
        });

        // Init on first load (IGN Feed)
        fetchRSS('https://www.ign.com/rss/articles/feed');
    </script>
</body>
</html>
